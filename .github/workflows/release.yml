name: Release

# Cut a release by pushing a tag, e.g.:  git tag v1.21-cavebridge && git push github v1.21-cavebridge
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # create the release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false      # one OS failing still ships the others
      matrix:
        include:
          - os: ubuntu-latest
            asset: cavebridge-linux-x86_64
          - os: macos-latest
            asset: cavebridge-macos-arm64
          - os: windows-latest
            asset: cavebridge-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python deps (front-end + bundler)
        run: pip install pyyaml openai pyinstaller

      # ---- Linux / macOS: libedit-free engine, then a one-file bundle ----
      - name: Build engine + bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          make clean
          make CFLAGS="-DADVENT_AUTOSAVE -DADVENT_NO_EDITLINE" LIBS=
          pyinstaller --onefile --name cavebridge --noconfirm \
            --add-data "adventure.yaml:." \
            --add-binary "advent:." \
            --collect-all openai --paths . \
            packaging/cavebridge_entry.py

      # ---- Windows: build a native advent.exe via MSYS2/mingw-w64, then bundle ----
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-yaml

      - name: Build engine (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          make clean || true
          make CFLAGS="-DADVENT_AUTOSAVE -DADVENT_NO_EDITLINE" LIBS=
          test -f advent.exe || cp advent advent.exe

      - name: Build bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --onefile --name cavebridge --noconfirm `
            --add-data "adventure.yaml;." `
            --add-binary "advent.exe;." `
            --collect-all openai --paths . `
            packaging/cavebridge_entry.py

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/cavebridge.exe "out/${{ matrix.asset }}.exe"
          else
            cp dist/cavebridge "out/${{ matrix.asset }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/*

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
